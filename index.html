<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Música</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:transparent;
    font-family:Arial, sans-serif;
}

.player{
    width:320px;
    padding:20px;
    border-radius:25px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    text-align:center;
}


button{
    width:70px;
    height:70px;
    border-radius:50%;
    border:none;
    background:#c9a45c;
    color:white;
    font-size:28px;
    cursor:pointer;
}


.progress{
    width:100%;
    margin-top:20px;
}


input[type="range"]{
    width:100%;
}


.time{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    color:#555;
}


.volume{
    margin-top:15px;
}


</style>

</head>

<body>


<div class="player">

<button id="play">▶</button>


<div class="progress">

<input type="range" id="barra" value="0">

<div class="time">
<span id="actual">0:00</span>
<span id="total">0:00</span>
</div>

</div>


<div class="volume">
🔊
<input type="range" id="volumen" min="0" max="1" step="0.01" value="1">
</div>


</div>



<audio id="audio">

<source src="cancion.mp3" type="audio/mpeg">

</audio>



<script>

const audio=document.getElementById("audio");
const play=document.getElementById("play");
const barra=document.getElementById("barra");
const volumen=document.getElementById("volumen");

const actual=document.getElementById("actual");
const total=document.getElementById("total");


play.onclick=()=>{

if(audio.paused){
audio.play();
play.innerHTML="❚❚";
}
else{
audio.pause();
play.innerHTML="▶";
}

};


audio.addEventListener("loadedmetadata",()=>{

barra.max=audio.duration;
total.innerHTML=formato(audio.duration);

});


audio.ontimeupdate=()=>{

barra.value=audio.currentTime;
actual.innerHTML=formato(audio.currentTime);

};


barra.oninput=()=>{

audio.currentTime=barra.value;

};


volumen.oninput=()=>{

audio.volume=volumen.value;

};



function formato(segundos){

let min=Math.floor(segundos/60);
let seg=Math.floor(segundos%60);

if(seg<10){
seg="0"+seg;
}

return min+":"+seg;

}


</script>


</body>
</html>
